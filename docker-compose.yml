version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  voice-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.voice_gateway
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - VOICE_GATEWAY_TWILIO_WS_URL=wss://your-domain/media-stream
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - voice-gateway
