<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinic Voice Assistant</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg: #f6f1ea;
        --accent: #1c6b5d;
        --accent-soft: #b6d9d2;
        --ink: #1d1d1b;
        --muted: #6a6864;
        --card: #fff8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top left, #fefbf7 0%, #f6f1ea 55%, #f0e6dc 100%);
      }

      header {
        padding: 2.5rem 1.5rem 1rem;
      }

      header h1 {
        font-family: "Spectral", serif;
        font-size: clamp(2rem, 4vw, 3rem);
        margin: 0 0 0.5rem;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 1.5rem;
        padding: 1.5rem;
      }

      @media (min-width: 960px) {
        .grid {
          grid-template-columns: 1.1fr 0.9fr;
          padding: 2rem 3rem 3rem;
        }
      }

      .card {
        background: var(--card);
        border-radius: 18px;
        padding: 1.5rem;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(28, 107, 93, 0.1);
      }

      .record-button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 1rem 1.5rem;
        border-radius: 999px;
        font-size: 1rem;
        cursor: pointer;
        display: inline-flex;
        gap: 0.75rem;
        align-items: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .record-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .record-button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(28, 107, 93, 0.25);
      }

      .chip {
        display: inline-block;
        padding: 0.3rem 0.6rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 600;
        font-size: 0.85rem;
      }

      .response {
        margin-top: 1.2rem;
      }

      .response audio {
        width: 100%;
        margin-top: 0.75rem;
      }

      .chart-card canvas {
        max-height: 260px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Multilingual Clinic Voice Assistant</h1>
      <p>Record, receive transcript, and listen to the receptionist response.</p>
    </header>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useRef } = React;

      function App() {
        const [recording, setRecording] = useState(false);
        const [transcript, setTranscript] = useState("");
        const [responseText, setResponseText] = useState("");
        const [language, setLanguage] = useState("");
        const [audioUrl, setAudioUrl] = useState("");
        const [status, setStatus] = useState("Idle");
        const mediaRecorderRef = useRef(null);
        const chunksRef = useRef([]);

        const startRecording = async () => {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const recorder = new MediaRecorder(stream);
          chunksRef.current = [];

          recorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
              chunksRef.current.push(event.data);
            }
          };

          recorder.onstop = () => {
            stream.getTracks().forEach((track) => track.stop());
          };

          recorder.start();
          mediaRecorderRef.current = recorder;
          setRecording(true);
          setStatus("Recording...");
        };

        const stopRecording = async () => {
          const recorder = mediaRecorderRef.current;
          if (!recorder) return;
          recorder.stop();
          setRecording(false);
          setStatus("Uploading...");

          const blob = new Blob(chunksRef.current, { type: "audio/webm" });
          const formData = new FormData();
          formData.append("audio", blob, "voice.webm");

          const response = await fetch("/voice_query", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();
          setTranscript(data.transcript || "");
          setResponseText(data.response_text || "");
          setLanguage(data.language || "");
          setAudioUrl(data.audio_url || "");
          setStatus("Ready");
        };

        return (
          <div className="grid">
            <section className="card">
              <span className="chip">Voice Assistant</span>
              <h2>Talk to the receptionist</h2>
              <p>Speak your request and get a localized response with audio playback.</p>
              <button
                className="record-button"
                onClick={recording ? stopRecording : startRecording}
              >
                {recording ? "Stop recording" : "Start recording"}
              </button>
              <p>Status: {status}</p>
              <div className="response">
                <p><strong>Transcript:</strong> {transcript || "-"}</p>
                <p><strong>Language:</strong> {language || "-"}</p>
                <p><strong>Assistant:</strong> {responseText || "-"}</p>
                {audioUrl && <audio controls src={audioUrl} />}
              </div>
            </section>
            <section className="card chart-card">
              <span className="chip">Analytics</span>
              <h2>Clinic Insights</h2>
              <canvas id="bookingsChart"></canvas>
              <canvas id="doctorChart"></canvas>
            </section>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);

      async function loadAnalytics() {
        const response = await fetch("/analytics/summary");
        const data = await response.json();

        const bookingsCtx = document.getElementById("bookingsChart");
        new Chart(bookingsCtx, {
          type: "bar",
          data: {
            labels: ["Total Bookings", "Cancellation %"],
            datasets: [
              {
                label: "Summary",
                data: [data.total_bookings, data.cancellation_rate],
                backgroundColor: ["#1c6b5d", "#c97f5f"],
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
          },
        });

        const doctorCtx = document.getElementById("doctorChart");
        new Chart(doctorCtx, {
          type: "doughnut",
          data: {
            labels: ["Top Doctor", "Other"],
            datasets: [
              {
                data: [1, 3],
                backgroundColor: ["#1c6b5d", "#b6d9d2"],
              },
            ],
          },
          options: {
            plugins: {
              legend: { position: "bottom" },
              tooltip: { callbacks: { label: () => data.top_doctor || "N/A" } },
            },
          },
        });
      }

      loadAnalytics();
    </script>
  </body>
</html>
